name: Weekly Bitcoin Content Pipeline

on:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of items to scrape per source'
        required: false
        default: '10'

jobs:
  scrape-translate-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Scrape Bitcoin Core PR Reviews
        run: |
          LIMIT=${{ github.event.inputs.limit || '10' }}
          python cli.py scrape --source reviews --limit $LIMIT

      - name: Scrape Optech Newsletters
        run: |
          LIMIT=${{ github.event.inputs.limit || '10' }}
          python cli.py scrape --source optech --limit $LIMIT

      - name: Translate reviews to Korean
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python cli.py translate --source reviews --limit 999

      - name: Translate optech newsletters to Korean
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python cli.py translate --source optech --limit 999

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new content to commit."
          else
            git commit -m "data: weekly content update $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Trigger Vercel deployment
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -X POST "$VERCEL_DEPLOY_HOOK"
          else
            echo "VERCEL_DEPLOY_HOOK not set, skipping explicit trigger."
          fi
