name: Weekly Bitcoin Content Pipeline

on:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of items to scrape per source'
        required: false
        default: '10'

jobs:
  scrape-translate-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx>=0.27 beautifulsoup4>=4.12 anthropic>=0.25 rich>=13.0 click>=8.1

      - name: Fetch Bitcoin Core PR Reviews (GitHub clone)
        run: python cli.py scrape --source reviews --mode github --limit 999

      - name: Fetch Optech Newsletters (GitHub clone)
        run: python cli.py scrape --source optech --mode github --limit 999

      - name: Translate reviews to Korean
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python cli.py translate --source reviews --limit 999

      - name: Translate optech newsletters to Korean
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python cli.py translate --source optech --limit 999

      - name: Sync data files to site
        run: |
          cp data/reviews.json site/src/data/reviews.json
          cp data/reviews_ko.json site/src/data/reviews_ko.json
          cp data/optech.json site/src/data/optech.json
          cp data/optech_ko.json site/src/data/optech_ko.json
          echo "Data files synced to site/src/data/"

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ site/src/data/
          if git diff --staged --quiet; then
            echo "No new content to commit."
          else
            git commit -m "data: weekly content update $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Trigger Vercel deployment
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -X POST "$VERCEL_DEPLOY_HOOK"
          else
            echo "VERCEL_DEPLOY_HOOK not set, skipping explicit trigger."
          fi
